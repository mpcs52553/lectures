<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Forms</title>
  <style>
    body { font-size: 22px; margin: 2em; font-family: system-ui; }
    input { font-size: 22px; padding: 6px; }
    input[type='submit'] { 
      padding: 6px 12px; 
      border-radius: 4px; 
      background-color: #009; 
      color: white;
    }
  </style>
</head>
<body>
  <h1>Form Example</h1>
  <form action="https://www.google.com/search">
    <p>
      <label for="search_term">Search:</label>
      <input required placeholder="Type here" autofocus="1" id="search_term" name="q" type="text">
    </p>
    <input type="submit">
  </form>
</body>
</html>
